<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>New Account | KreditLithua</title>
    <meta name="description" content="Register for KreditLithua secure access.">
    <meta property="og:title" content="New Account | KreditLithua">
    <meta property="og:image" content="meta.png">
    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#002855" },
                    fontFamily: { "sans": ["'Space Grotesk'", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #ffffff;
            color: #0f172a;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
        }

        * {
            border-radius: 0 !important;
        }
    </style>
</head>

<body
    class="min-h-screen flex flex-col items-center justify-center p-6 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjIiIGZpbGw9IiNlMmU4ZjAiLz48L3N2Zz4=')]">

    <div
        class="w-full max-w-md bg-white border-4 border-slate-900 shadow-[20px_20px_0px_0px_rgba(15,23,42,1)] p-6 md:p-12 relative overflow-hidden">
        <!-- Decorative Header Stripe -->
        <div class="absolute top-0 left-0 w-full h-4 bg-primary"></div>

        <div class="flex flex-col items-center justify-center mb-8 text-center">
            <a href="index.html" class="hover:opacity-75 transition-opacity">
                <img src="logo.png" alt="KreditLithua" class="h-12 w-auto object-contain mb-2">
            </a>
            <h2 class="text-xs font-bold uppercase tracking-[0.3em] text-slate-400 leading-none">Global Finance</h2>
        </div>

        <h3 class="text-xl font-bold uppercase tracking-widest mb-6 border-b-2 border-slate-100 pb-4 text-center">Client
            Registration
        </h3>

        <form id="signup-form">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">First
                        Name</label>
                    <input type="text" id="firstname"
                        class="w-full bg-slate-50 border-2 border-slate-200 p-3 font-bold text-slate-900 focus:border-primary focus:ring-0 placeholder:text-slate-300 transition-all"
                        placeholder="John" required>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Last
                        Name</label>
                    <input type="text" id="lastname"
                        class="w-full bg-slate-50 border-2 border-slate-200 p-3 font-bold text-slate-900 focus:border-primary focus:ring-0 placeholder:text-slate-300 transition-all"
                        placeholder="Doe" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Phone
                    Number</label>
                <input type="tel" id="phone"
                    class="w-full bg-slate-50 border-2 border-slate-200 p-3 font-bold text-slate-900 focus:border-primary focus:ring-0 placeholder:text-slate-300 transition-all"
                    placeholder="+1 (555) 000-0000" required>
            </div>

            <!-- Email is often typical for 'Bank' signups, even if simulation uses ID as username. 
                 Let's collect it but maybe map it to username or store in 'name' or separate field?
                 utils.createUser schema: { name, username, password, pin, balance, ... }
                 DB 'users' table columns: name, username, password, pin, balance, is_admin.
                 So we don't have an email column visible in previous file views.
                 We will map "Email" or "ID" to 'username'. 
                 User asked for "Username / ID" in login.
                 Let's ask for "Username" specifically here.
            -->

            <div class="mb-4">
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Email
                    Address</label>
                <input type="email" id="email"
                    class="w-full bg-slate-50 border-2 border-slate-200 p-3 font-bold text-slate-900 focus:border-primary focus:ring-0 placeholder:text-slate-300 transition-all"
                    placeholder="name@example.com" required>
            </div>

            <div class="mb-4">
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Desired Username /
                    ID</label>
                <input type="text" id="username"
                    class="w-full bg-slate-50 border-2 border-slate-200 p-3 font-bold text-slate-900 focus:border-primary focus:ring-0 placeholder:text-slate-300 transition-all"
                    placeholder="User ID" required>
            </div>



            <div id="error-msg"
                class="hidden mb-6 bg-rose-50 border-2 border-rose-100 text-rose-600 p-3 text-xs font-bold uppercase tracking-wide">
                <span class="material-symbols-outlined align-bottom text-base mr-1">error</span> <span
                    id="error-text">Registration Failed</span>
            </div>

            <div id="success-msg"
                class="hidden mb-6 bg-emerald-50 border-2 border-emerald-100 text-emerald-600 p-3 text-xs font-bold uppercase tracking-wide">
                <span class="material-symbols-outlined align-bottom text-base mr-1">check_circle</span> Application
                Received.
            </div>

            <button type="submit"
                class="w-full py-4 bg-primary text-white font-bold uppercase tracking-[0.2em] hover:bg-blue-800 transition-all border-b-4 border-blue-900 active:border-b-0 active:translate-y-1">
                Submit Application
            </button>
        </form>

        <div class="mt-6 pt-4 border-t-2 border-slate-100 text-center flex flex-col gap-3">
            <a href="login.html"
                class="text-xs font-bold uppercase tracking-widest text-slate-500 hover:text-primary transition-colors">
                Already have an account? Sign In
            </a>
            <a href="index.html"
                class="text-xs font-bold uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-colors">
                ← Back to Home
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="utils.js"></script>
    <script>
        utils.init();

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstname = document.getElementById('firstname').value;
            const lastname = document.getElementById('lastname').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            // Generate Random Password for Applicant
            const password = Math.random().toString(36).slice(-8);
            const btn = e.submitter;
            const originalText = btn.innerHTML;

            // Loading
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-pulse">Processing...</span>';

            document.getElementById('error-msg').classList.add('hidden');
            document.getElementById('success-msg').classList.add('hidden');

            try {
                // Check if user exists? utils.login check or direct insert fail
                // We'll try to insert directly.
                // Schema: name, username, password. PIN defaults to '0000', balance 0.

                await utils.createUser({
                    name: `${firstname} ${lastname}`,
                    first_name: firstname,
                    last_name: lastname,
                    phone: phone,
                    email: email,
                    username: username,
                    password: password,
                    pin: '0000', // Default
                    balance: 0
                }, true); // isApplicant = true

                // Success
                // Success - Show Confirmation View
                document.getElementById('signup-form').classList.add('hidden');

                const container = document.querySelector('.bg-white'); // The main card
                container.innerHTML = `
                    <div class="text-center py-10">
                        <span class="material-symbols-outlined text-6xl text-emerald-500 mb-4">check_circle</span>
                        <h2 class="text-2xl font-bold uppercase tracking-tighter text-slate-900 mb-4">Application Received</h2>
                        <p class="text-slate-600 font-medium mb-8 max-w-xs mx-auto leading-relaxed">
                            Thank you for your interest. An account officer will review your details and reach out to you shortly for the next steps.
                        </p>
                        <a href="index.html" class="inline-block px-8 py-3 bg-slate-900 text-white font-bold uppercase tracking-widest text-xs hover:bg-primary transition-colors">
                            Return to Home
                        </a>
                    </div>
                `;

            } catch (err) {
                console.error(err);
                document.getElementById('error-text').textContent = err.message || 'Registration Failed';
                document.getElementById('error-msg').classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>

</html>
