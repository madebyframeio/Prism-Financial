<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Client Application | Prism</title>
    <meta name="description" content="Apply for a Prism account.">
    <meta property="og:title" content="Client Application | Prism">
    <meta property="og:image" content="meta.png">
    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="theme.js"></script>
    <style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
            @apply bg-surface text-secondary antialiased;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Urbanist', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-100">

    <div class="w-full max-w-lg bg-white p-8 md:p-12 relative shadow-finance rounded">
        <!-- Decorative Header Stripe -->
        <div class="absolute top-0 left-0 w-full h-1 bg-accent"></div>

        <div class="flex flex-col items-center justify-center mb-8 text-center">
            <a href="index.html" class="hover:opacity-75 transition-opacity flex items-center gap-2">
                <img src="logo.png" alt="Prism Logo" class="h-12 w-auto mb-4">
                <h2 class="text-xs font-bold uppercase tracking-widest text-slate-500">Prism Financial</h2>
                <span class="text-xl font-bold tracking-tight text-primary font-serif">Prism</span>
            </a>
        </div>

        <h3 class="text-2xl font-bold text-center mb-8 text-primary font-serif">Client Registration</h3>

        <form id="signup-form">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">First
                        Name</label>
                    <input type="text" id="firstname"
                        class="w-full bg-slate-50 border border-slate-300 p-3 text-slate-900 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all rounded-sm placeholder:text-slate-400"
                        placeholder="John" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Last
                        Name</label>
                    <input type="text" id="lastname"
                        class="w-full bg-slate-50 border border-slate-300 p-3 text-slate-900 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all rounded-sm placeholder:text-slate-400"
                        placeholder="Doe" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Phone
                    Number</label>
                <input type="tel" id="phone"
                    class="w-full bg-slate-50 border border-slate-300 p-3 text-slate-900 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all rounded-sm placeholder:text-slate-400"
                    placeholder="+1 (555) 000-0000" required>
            </div>

            <div class="mb-4">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Email
                    Address</label>
                <input type="email" id="email"
                    class="w-full bg-slate-50 border border-slate-300 p-3 text-slate-900 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all rounded-sm placeholder:text-slate-400"
                    placeholder="name@example.com" required>
            </div>

            <div class="mb-6">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Desired Username
                    / ID</label>
                <input type="text" id="username"
                    class="w-full bg-slate-50 border border-slate-300 p-3 text-slate-900 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all rounded-sm placeholder:text-slate-400"
                    placeholder="User ID" required>
            </div>

            <div id="error-msg" class="hidden mb-6 bg-red-50 border-l-4 border-red-500 text-red-700 p-3 text-sm">
                <div class="flex items-center">
                    <span class="material-symbols-outlined text-base mr-2">error</span>
                    <span id="error-text">Registration Failed</span>
                </div>
            </div>

            <div id="success-msg"
                class="hidden mb-6 bg-emerald-50 border-l-4 border-emerald-500 text-emerald-700 p-3 text-sm">
                <div class="flex items-center">
                    <span class="material-symbols-outlined text-base mr-2">check_circle</span>
                    <span>Application Received.</span>
                </div>
            </div>

            <button type="submit"
                class="w-full py-3 bg-primary text-white font-medium uppercase tracking-wider hover:bg-slate-800 transition-all rounded-sm shadow-md">
                Submit Application
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center flex flex-col gap-3">
            <a href="login.html" class="text-sm text-slate-600 hover:text-primary transition-colors">
                Already have an account? Sign In
            </a>
            <a href="index.html"
                class="text-xs font-medium uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-colors">
                ← Back to Home
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="utils.js"></script>
    <script>
        utils.init();

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstname = document.getElementById('firstname').value;
            const lastname = document.getElementById('lastname').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            // Generate Random Password for Applicant
            const password = Math.random().toString(36).slice(-8);
            const btn = e.submitter;
            const originalText = btn.innerHTML;

            // Loading
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-pulse">Processing...</span>';

            document.getElementById('error-msg').classList.add('hidden');
            document.getElementById('success-msg').classList.add('hidden');

            try {
                // Check if user exists? utils.login check or direct insert fail
                // We'll try to insert directly.
                // Schema: name, username, password. PIN defaults to '0000', balance 0.

                await utils.createUser({
                    name: `${firstname} ${lastname}`,
                    first_name: firstname,
                    last_name: lastname,
                    phone: phone,
                    email: email,
                    username: username,
                    password: password,
                    pin: '0000', // Default
                    balance: 0
                }, true); // isApplicant = true

                // Success
                // Success - Show Confirmation View
                document.getElementById('signup-form').classList.add('hidden');

                const container = document.querySelector('.bg-white'); // The main card
                container.innerHTML = `
                    <div class="text-center py-10">
                        <span class="material-symbols-outlined text-6xl text-emerald-500 mb-4">check_circle</span>
                        <h2 class="text-2xl font-bold uppercase tracking-tighter text-slate-900 mb-4">Application Received</h2>
                        <p class="text-slate-600 font-medium mb-8 max-w-xs mx-auto leading-relaxed">
                            Thank you for your interest. An account officer will review your details and reach out to you shortly for the next steps.
                        </p>
                        <a href="index.html" class="inline-block px-8 py-3 bg-slate-900 text-white font-bold uppercase tracking-widest text-xs hover:bg-primary transition-colors">
                            Return to Home
                        </a>
                    </div>
                `;

            } catch (err) {
                console.error(err);
                document.getElementById('error-text').textContent = err.message || 'Registration Failed';
                document.getElementById('error-msg').classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
    <!-- Simulation Disclaimer -->
    <div class="fixed bottom-0 left-0 w-full bg-amber-50 border-t border-amber-200 py-2 text-center z-[200]">
        <p class="text-[10px] uppercase tracking-widest font-bold text-amber-800">
            Prism Simulation Environment • Educational Project • No Real Money Involved
        </p>
    </div>
</body>

</html>
