<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Withdraw Investment | KreditLithua</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-lg w-full bg-white border-4 border-slate-900 shadow-[20px_20px_0px_0px_rgba(15,23,42,0.1)] p-8">
        <h1 class="text-2xl font-bold uppercase tracking-tighter text-slate-900 mb-2">Withdraw Funds</h1>
        <p class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-8">Investment Withdrawal</p>

        <form id="withdraw-form" onsubmit="handleWithdraw(event)">
            <div class="mb-6">
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Amount to Withdraw
                    ($)</label>
                <input type="number" id="amount" required step="0.01"
                    class="w-full bg-slate-50 border-2 border-slate-200 p-4 font-mono text-lg font-bold text-slate-900 focus:outline-none focus:border-slate-900">
            </div>

            <div class="mb-6">
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Beneficiary
                    Destination</label>
                <input type="text" required
                    class="w-full bg-slate-50 border-2 border-slate-200 p-3 font-bold text-slate-900 focus:outline-none focus:border-slate-900 uppercase"
                    placeholder="e.g. CHASE BANK">
            </div>

            <div class="mb-6">
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Account
                    Number</label>
                <input type="text" required
                    class="w-full bg-slate-50 border-2 border-slate-200 p-3 font-bold text-slate-900 focus:outline-none focus:border-slate-900 uppercase">
            </div>

            <div class="bg-amber-50 border-l-4 border-amber-400 p-4 mb-8">
                <p class="text-xs font-bold text-amber-800 uppercase tracking-widest mb-1">Important</p>
                <p class="text-sm text-amber-900">Large withdrawals may require additional security verification.</p>
            </div>

            <button type="submit"
                class="w-full py-4 bg-slate-900 text-white font-bold uppercase tracking-widest text-xs hover:bg-blue-600 transition-colors shadow-[4px_4px_0px_0px_rgba(0,0,0,0.2)]">
                Proceed to Verification
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="dashboard.html"
                class="text-xs font-bold uppercase tracking-widest text-slate-400 hover:text-slate-900">Cancel</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="utils.js"></script>
    <script>
        utils.init();

        async function handleWithdraw(e) {
            e.preventDefault();
            const amount = document.getElementById('amount').value;
            const currentUser = utils.getCurrentUser();

            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }

            try {
                // We create a transaction record, or maybe just passthrough?
                // Plan: Create pending transaction -> Go to security code
                await utils.createTransaction(currentUser.id, amount, 'investment_withdrawal', 'Portfolio Liquidation Request', 'pending');
                window.location.href = 'security-code.html';
            } catch (err) {
                alert("Error processing request: " + err.message);
                console.error(err);
            }
        }
    </script>
</body>

</html>
