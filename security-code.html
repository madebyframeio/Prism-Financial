<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Identity Verification | KreditLithua</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-sm w-full bg-white p-8 border-4 border-slate-700 shadow-[0px_0px_40px_rgba(0,0,0,0.5)]">
        <div class="text-center mb-8">
            <span class="material-symbols-outlined text-5xl text-slate-900 mb-4">gpp_maybe</span>
            <h1 class="text-xl font-bold uppercase tracking-tighter text-slate-900">Identity Verification</h1>
            <p class="text-xs font-bold uppercase tracking-widest text-slate-400 mt-2">Compliance Verification</p>
        </div>

        <p class="text-sm text-center mb-6 text-slate-600">Please enter the 6-digit verification code sent to your
            device to finalize this transaction.</p>

        <form onsubmit="verifyCode(event)">
            <div class="mb-6">
                <input type="text" id="code" maxlength="6"
                    class="w-full text-center text-3xl font-mono font-bold tracking-[0.5em] border-b-4 border-slate-200 focus:border-slate-900 outline-none py-2 text-slate-900"
                    placeholder="000000" required>
            </div>

            <button type="submit"
                class="w-full py-4 bg-slate-900 text-white font-bold uppercase tracking-widest text-xs hover:bg-blue-600 transition-colors">
                Verify Identity
            </button>
        </form>
    </div>

    <script>
        function verifyCode(e) {
            e.preventDefault();
            // Mock Validation - In reality this would check against a DB or generated code
            // For now, any code works or we can make a fake delay
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "VERIFYING...";
            btn.disabled = true;

            setTimeout(() => {
                window.location.href = 'legal.html';
            }, 700);
        }
    </script>
</body>

</html>
