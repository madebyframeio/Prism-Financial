<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Identity Verification | Prism Financials Online</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#008450",
                        secondary: "#004B8D",
                        accent: "#FCCC44",
                        bankGray: "#F4F4F4",
                        bankText: "#333333",
                        borderGray: "#D1D1D1"
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                    }
                }
            }
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-slate-900 text-bankText font-sans antialiased; }
        }
    </style>
    <link rel="icon" type="image/png" href="logo.png">

    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <meta name="googlebot" content="noindex, nofollow">

    <!-- Social Meta Tags -->
    <meta property="og:title" content="Prism Financials Online">
    <meta property="og:description" content="Secure, simplified, and powerful online banking. Access your dashboard, track your transactions, and manage your assets with Prism Financials.">
    <meta property="og:image" content="https://prism-financial.netlify.app/logo.png">
    <meta property="og:url" content="https://prism-financial.netlify.app/">
    <meta property="og:type" content="website">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Prism Financials Online">
    <meta name="twitter:description" content="Secure, simplified, and powerful online banking. Access your dashboard, track your transactions, and manage your assets with Prism Financials.">
    <meta name="twitter:image" content="https://prism-financial.netlify.app/logo.png">
</head>

<body
    class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-slate-800 to-slate-950">
    <div class="max-w-md w-full bg-white p-10 border border-slate-700 shadow-2xl rounded-sm">
        <div class="text-center mb-10">
            <div
                class="w-16 h-16 bg-primary/5 text-primary rounded-full flex items-center justify-center mx-auto mb-6 border-2 border-primary/20">
                <span class="material-symbols-outlined text-4xl">gpp_maybe</span>
            </div>
            <h1 class="text-2xl font-black uppercase tracking-tighter text-bankText leading-none mb-2">2-Step
                Verification</h1>
            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Security Clearance Required</p>
        </div>

        <p class="text-xs font-semibold text-center mb-10 leading-relaxed text-gray-500">
            For your protection, we've sent a 6-digit verification code to your registered device. Please enter it below
            to authorize this liquidations request.
        </p>

        <form onsubmit="verifyCode(event)">
            <div class="mb-10">
                <input type="text" id="code" maxlength="6"
                    class="w-full text-center text-4xl font-black tracking-[0.4em] border-b-4 border-bankGray focus:border-primary outline-none py-4 text-bankText placeholder:text-gray-200 transition-all"
                    placeholder="000000" required>
            </div>

            <button type="submit"
                class="w-full py-4 bg-primary text-white font-black uppercase tracking-widest text-[11px] hover:bg-green-800 transition-all shadow-md active:scale-95 rounded-sm">
                AUTHORIZE TRANSACTION
            </button>
        </form>

        <div class="mt-10 text-center">
            <a href="dashboard.html"
                class="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-primary transition-colors">Cancel
                & Discard Request</a>
        </div>
    </div>

    <!-- Simulation Disclaimer -->
    <div class="fixed bottom-0 left-0 w-full bg-black/50 py-2 text-center pointer-events-none">
        <p class="text-[9px] uppercase tracking-[0.4em] font-black text-white opacity-50">
            Secure Encryption Verified
        </p>
    </div>

    <script>
        function verifyCode(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "AUTHORIZING...";
            btn.disabled = true;

            setTimeout(() => {
                window.location.href = 'processing.html';
            }, 1200);
        }
    </script>
</body>

</html>
