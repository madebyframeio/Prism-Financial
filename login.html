<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Client Access | Prism</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Secure portal access for Prism partners.">
    <meta property="og:title" content="Client Access | Prism">
    <meta property="og:image" content="meta.png">
    <meta property="og:url" content="https://www.prism.finance/login.html">
    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="theme.js"></script>
    <style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
            @apply bg-surface text-secondary antialiased;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Urbanist', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-100">

    <div class="w-full max-w-md bg-white p-8 md:p-12 relative shadow-finance rounded">
        <!-- Decorative Header Stripe -->
        <div class="absolute top-0 left-0 w-full h-1 bg-accent"></div>

        <div class="flex flex-col items-center justify-center mb-10 text-center">
            <img src="logo.png" alt="Prism Logo" class="h-16 w-auto mb-4">
            <h2 class="text-xs font-bold uppercase tracking-widest text-slate-500">Prism Financial</h2>
        </div>

        <h3 class="text-2xl font-bold text-center mb-8 text-primary font-serif">Secure Sign In</h3>

        <form id="login-form">
            <div class="mb-6">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Username /
                    ID</label>
                <input type="text" id="username"
                    class="w-full bg-slate-50 border border-slate-300 p-3 text-slate-900 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all rounded-sm placeholder:text-slate-400"
                    placeholder="Enter ID" required>
            </div>

            <div class="mb-8">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Password</label>
                <input type="password" id="password"
                    class="w-full bg-slate-50 border border-slate-300 p-3 text-slate-900 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all rounded-sm placeholder:text-slate-400"
                    placeholder="••••••••" required>
            </div>

            <div id="error-msg" class="hidden mb-6 bg-red-50 border-l-4 border-red-500 text-red-700 p-3 text-sm">
                <div class="flex items-center">
                    <span class="material-symbols-outlined text-base mr-2">error</span>
                    <span>Invalid Credentials</span>
                </div>
            </div>

            <button type="submit"
                class="w-full py-3 bg-primary text-white font-medium uppercase tracking-wider hover:bg-slate-800 transition-all rounded-sm shadow-md">
                Access Account
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <div class="flex items-center justify-center gap-2 mb-6">
                <span class="material-symbols-outlined text-slate-400 text-sm">lock</span>
                <p class="text-[10px] font-medium uppercase tracking-widest text-slate-400">
                    Encrypted Connection
                </p>
            </div>

            <div class="flex flex-col gap-3">
                <a href="signup.html" class="text-sm text-slate-600 hover:text-primary transition-colors">
                    Apply for an Account
                </a>
                <a href="index.html"
                    class="text-xs font-medium uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-colors">
                    ← Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="utils.js"></script>
    <script>
        // Init Utils (which inits Supabase)
        utils.init();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = e.submitter;
            const originalText = btn.innerHTML;

            // Loading state
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-pulse">Accessing...</span>';

            // Special Admin Check (Hardcoded for simulator, or could be in DB)
            // We'll check DB for admin flag if we want it dynamic, 
            // OR keep the "admin" user as a special case in the DB.
            // Let's assume we check the DB.

            try {
                const user = await utils.login(username, password);

                if (user) {
                    if (user.is_admin) {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    // Fallback for hardcoded admin if not in DB yet
                    if (username === 'admin' && password === 'admin') {
                        // Mock a full user object so admin.html parsing works
                        sessionStorage.setItem('currentUser', JSON.stringify({
                            id: '00000000-0000-0000-0000-000000000000', // Mock UUID
                            role: 'admin',
                            username: 'admin',
                            name: 'Root Administrator',
                            password: 'admin',
                            balance: 0,
                            is_admin: true
                        }));
                        window.location.href = 'admin.html';
                    } else {
                        showError();
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                    }
                }
            } catch (err) {
                console.error(err);
                showError();
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        function showError() {
            const err = document.getElementById('error-msg');
            err.classList.remove('hidden');
            setTimeout(() => err.classList.add('hidden'), 3000);
        }

        // --- Security Protection ---
        // (Cleaned for Prism Standard Compliance)
    </script>
    <!-- Simulation Disclaimer -->
    <div
        class="fixed bottom-0 left-0 w-full bg-amber-50 border-t border-amber-200 py-2 text-center z-[200] opacity-0 pointer-events-none">
        <p class="text-[10px] uppercase tracking-widest font-bold text-amber-800">
            Prism Simulation Environment • Educational Project • No Real Money Involved
        </p>
    </div>
</body>

</html>
