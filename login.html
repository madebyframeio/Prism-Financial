<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Orion | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#002855" },
                    fontFamily: { "sans": ["'Space Grotesk'", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #ffffff;
            color: #0f172a;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
        }

        * {
            border-radius: 0 !important;
        }
    </style>
</head>

<body
    class="min-h-screen flex flex-col items-center justify-center p-6 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjIiIGZpbGw9IiNlMmU4ZjAiLz48L3N2Zz4=')]">

    <div
        class="w-full max-w-md bg-white border-4 border-slate-900 shadow-[20px_20px_0px_0px_rgba(15,23,42,1)] p-6 md:p-12 relative overflow-hidden">
        <!-- Decorative Header Stripe -->
        <div class="absolute top-0 left-0 w-full h-4 bg-primary"></div>

        <div class="flex items-center gap-4 mb-10">
            <div class="brand-logo-container bg-primary p-2 text-white border-2 border-slate-900">
                <span class="material-symbols-outlined block text-3xl">account_balance</span>
            </div>
            <div>
                <h1 class="text-3xl font-bold uppercase tracking-tighter italic leading-none brand-text">Orion</h1>
                <h2 class="text-xs font-bold uppercase tracking-[0.3em] text-slate-400 leading-none mt-1">Global Finance
                </h2>
            </div>
        </div>

        <h3 class="text-xl font-bold uppercase tracking-widest mb-8 border-b-2 border-slate-100 pb-4">Secure Sign In
        </h3>

        <form id="login-form">
            <div class="mb-6">
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Username /
                    ID</label>
                <input type="text" id="username"
                    class="w-full bg-slate-50 border-2 border-slate-200 p-3 font-bold text-slate-900 focus:border-primary focus:ring-0 placeholder:text-slate-300 transition-all"
                    placeholder="Enter ID" required>
            </div>

            <div class="mb-8">
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Password</label>
                <input type="password" id="password"
                    class="w-full bg-slate-50 border-2 border-slate-200 p-3 font-bold text-slate-900 focus:border-primary focus:ring-0 placeholder:text-slate-300 transition-all"
                    placeholder="••••••••" required>
            </div>

            <div id="error-msg"
                class="hidden mb-6 bg-rose-50 border-2 border-rose-100 text-rose-600 p-3 text-xs font-bold uppercase tracking-wide">
                <span class="material-symbols-outlined align-bottom text-base mr-1">error</span> Access Denied: Invalid
                Credentials
            </div>

            <button type="submit"
                class="w-full py-4 bg-primary text-white font-bold uppercase tracking-[0.2em] hover:bg-blue-800 transition-all border-b-4 border-blue-900 active:border-b-0 active:translate-y-1">
                Access Account
            </button>
        </form>

        <div class="mt-8 pt-6 border-t-2 border-slate-100 text-center">
            <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">
                Protected by <span class="brand-text">Orion</span> Secure Access
            </p>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="utils.js"></script>
    <script>
        // Init Utils (which inits Supabase)
        utils.init();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = e.submitter;
            const originalText = btn.innerHTML;

            // Loading state
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-pulse">Accessing...</span>';

            // Special Admin Check (Hardcoded for simulator, or could be in DB)
            // We'll check DB for admin flag if we want it dynamic, 
            // OR keep the "admin" user as a special case in the DB.
            // Let's assume we check the DB.

            try {
                const user = await utils.login(username, password);

                if (user) {
                    if (user.is_admin) {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    // Fallback for hardcoded admin if not in DB yet
                    if (username === 'admin' && password === 'admin') {
                        sessionStorage.setItem('currentUser', JSON.stringify({ role: 'admin', username: 'admin' }));
                        window.location.href = 'admin.html';
                    } else {
                        showError();
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                    }
                }
            } catch (err) {
                console.error(err);
                showError();
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        function showError() {
            const err = document.getElementById('error-msg');
            err.classList.remove('hidden');
            setTimeout(() => err.classList.add('hidden'), 3000);
        }

        // --- Security Protection ---
        // (Cleaned for Orion Standard Compliance)
    </script>
</body>

</html>
